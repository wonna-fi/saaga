name: init
steps:
  - agent:
      prompt: document-architecture
      vars:
        app: ${app}
        docs_dir: ${docs_dir}

  - agent:
      prompt: plan-init
      vars:
        app: ${app}
        docs_dir: ${docs_dir}
        output_path: ${run_dir}/plans/${app}-init.plan.md
      expect_file: ${run_dir}/plans/${app}-init.plan.md

  - script:
      name: parse-plan
      file: ${run_dir}/plans/${app}-init.plan.md
      set: phases

  - agent:
      prompt: slice-doc
      vars:
        plan: ${run_dir}/plans/${app}-init.plan.md
        phase_number: 0

  - script:
      name: install-rules
      app_dir: ${app_path}
      app: ${app}
      rule_targets: ${rule_targets}
      docs_dir: ${docs_dir}

  - foreach:
      var: phase
      in: ${phases}
      when: '${phase.number} != 0'
      do:
        - agent:
            prompt: slice-doc
            vars:
              plan: ${run_dir}/plans/${app}-init.plan.md
              phase_number: ${phase.number}

        - loop:
            max: 3
            until: '${status} == "PASS"'
            do:
              - agent:
                  prompt: verify-domain-documentation
                  vars:
                    plan: ${run_dir}/plans/${app}-init.plan.md
                    phase_number: ${phase.number}
                    review_path: ${run_dir}/slice-${phase.number}/review-${iteration}.md
                    status_path: ${run_dir}/slice-${phase.number}/status-${iteration}.txt
                    changes_dir: none
                    docs_dir: ${docs_dir}

              - read-file:
                  path: ${run_dir}/slice-${phase.number}/status-${iteration}.txt
                  set: status
                  trim: true

              - if: '${status} != "PASS"'
                then:
                  - agent:
                      prompt: fix-documentation
                      vars:
                        plan: ${run_dir}/plans/${app}-init.plan.md
                        phase_number: ${phase.number}
                        review_path: ${run_dir}/slice-${phase.number}/review-${iteration}.md

  - script:
      name: generate-baseline
      app_dir: ${app_path}
      docs_dir: ${docs_dir}
